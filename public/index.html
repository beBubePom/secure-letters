<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>100 Lá Thư Cho Em</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Canvas hạt bụi -->
  <canvas id="particleCanvas"></canvas>



  <!-- PopCat -->
  <div id="musicCat">
    <img id="catImg" src="images/pop1.png" alt="Pop Cat">
  </div>

  <!-- Tiêu đề typing -->
  <h1><span id="typingText"></span><span id="typingCursor">|</span></h1>
  <p class="subtitle">mong rằng sự đồng hành cùng em có thể giúp anh hiểu hơn về nó</p>

  <!-- Layout chính: 2 cột -->
  <div class="main-layout">
    <div class="letter-list" id="letterGrid"></div>
    <div class="side-panel">
      <div id="countdown"></div>
    </div>
  </div>

  <!-- Modal -->
  <div id="modal" class="modal">
    <div class="modal-content">
      <span id="closeBtn">&times;</span>
      <h2 id="modalTitle"></h2>

      <!-- Envelope animation — Vintage style 5 -->
      <div id="envelopeWrap">
        <svg id="envelopeSVG" viewBox="0 0 200 150" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <filter id="glow">
              <feGaussianBlur stdDeviation="2.5" result="blur"/>
              <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
            </filter>
          </defs>

          <!-- Envelope body -->
          <rect x="5" y="55" width="190" height="90" rx="5"
            fill="rgba(25,14,40,0.95)" stroke="rgba(240,150,165,0.55)" stroke-width="1.2"/>

          <!-- Paper sticking out (sẽ animate slide lên) -->
          <g id="envelopeFlap" style="transform-origin:100px 55px">
            <rect x="25" y="12" width="150" height="75" rx="3"
              fill="rgba(35,20,52,0.95)" stroke="rgba(240,150,165,0.4)" stroke-width="1"/>
            <!-- Dòng kẻ trên giấy -->
            <line x1="42" y1="30" x2="158" y2="30" stroke="rgba(240,150,165,0.15)" stroke-width="0.8"/>
            <line x1="42" y1="42" x2="158" y2="42" stroke="rgba(240,150,165,0.15)" stroke-width="0.8"/>
            <line x1="42" y1="54" x2="140" y2="54" stroke="rgba(240,150,165,0.15)" stroke-width="0.8"/>
            <line x1="42" y1="66" x2="120" y2="66" stroke="rgba(240,150,165,0.12)" stroke-width="0.8"/>
            <!-- Chữ ký nhỏ -->
            <text x="100" y="55" text-anchor="middle"
              fill="rgba(240,160,175,0.35)" font-size="13" font-family="serif" font-style="italic">♡</text>
          </g>

          <!-- Bottom folds -->
          <path d="M5,145 L100,98 L195,145 Z"
            fill="rgba(18,8,32,0.7)" stroke="rgba(240,150,165,0.2)" stroke-width="0.8"/>
          <path d="M5,55 L100,98" stroke="rgba(240,150,165,0.2)" stroke-width="0.8"/>
          <path d="M195,55 L100,98" stroke="rgba(240,150,165,0.2)" stroke-width="0.8"/>

          <!-- Con dấu -->
          <g id="envelopeSeal">
            <circle cx="100" cy="100" r="13"
              fill="rgba(200,100,130,0.6)" stroke="rgba(240,160,175,0.8)" stroke-width="1" filter="url(#glow)"/>
            <text x="100" y="105" text-anchor="middle"
              fill="rgba(255,215,225,0.95)" font-size="11" font-family="serif">♡</text>
          </g>
        </svg>
      </div>

      <div id="passwordSection">
        <input type="password" id="passwordInput" placeholder="mật khẩu...">
        <button onclick="checkPassword()">mở thư</button>
        <p id="error"></p>
      </div>

      <div id="letterContent" style="display:none;"></div>
    </div>
  </div>

  <audio id="bgMusic" src="music/background.mp3" loop></audio>
  <audio id="letterMusic"></audio>

  <!-- Libraries -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
  <script src="script.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>100 Lá Thư Cho Em</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Hiệu ứng hạt rơi -->
<canvas id="particleCanvas"></canvas>
<!-- Mặt trời / Mặt trăng -->
<canvas id="celestialCanvas"></canvas>

<!-- PopCat nhạc -->
<div id="musicCat">
  <img id="catImg" src="images/pop1.png" alt="Pop Cat">
</div>

<h1>100 Lá Thư Cho Em</h1>

<div class="letter-list" id="letterGrid"></div>

<!-- Modal -->
<div id="modal" class="modal">
  <div class="modal-content">
    <span id="closeBtn">&times;</span>
    <h2 id="modalTitle"></h2>
    <div id="passwordSection">
      <input type="password" id="passwordInput" placeholder="Nhập mật mã...">
      <button onclick="checkPassword()">Mở thư</button>
      <p id="error"></p>
    </div>
    <div id="letterContent" style="display:none;"></div>
  </div>
</div>

<audio id="bgMusic" src="music/background.mp3" loop></audio>
<audio id="letterMusic"></audio>

<script src="script.js"></script>
</body>
</html>
